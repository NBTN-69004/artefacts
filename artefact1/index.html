<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artefact pédagogique</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 20px;
}
button {
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
}
.correct { background: green; }
.wrong { background: red; }
</style>
</head>

<body>

<h2>🔥 Situation : feu d’appartement</h2>

<p>Quelle est votre priorité ?</p>

<button onclick="check(this,false)">Entrer immédiatement</button>
<button onclick="check(this,true)">Reconnaissance</button>
<button onclick="check(this,false)">Attendre</button>

<p id="feedback"></p>

<script>
function check(btn, correct){
  if(correct){
    btn.className="correct";
    document.getElementById("feedback").innerText="Bonne réponse 👍";
  } else {
    btn.className="wrong";
    document.getElementById("feedback").innerText="Mauvaise réponse ❌";
  }
}
</script>

</body>
</html>
